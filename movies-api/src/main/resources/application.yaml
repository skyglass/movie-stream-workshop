server:
  port: 8080

spring:
  application:
    name: movies-api

  datasource:
    url: ${MOVIES_JDBC_URL:jdbc:postgresql://localhost:5432/movies}
    username: ${MOVIES_JDBC_USERNAME:movies}
    password: ${MOVIES_JDBC_PASSWORD:movies}
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    validate-on-migrate: true

  sql:
    init:
      mode: never

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8180/realms/movies}

security:
  expected-audience: ${EXPECTED_AUDIENCE:movies-api}

jwt:
  auth:
    converter:
      resource-id: ${JWT_AUTH_RESOURCE_ID:movies-ui}
      principal-attribute: preferred_username

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:7000,http://localhost:8079,http://localhost:4200,http://127.0.0.1:4200}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true

springdoc:
  swagger-ui:
    disable-swagger-default-url: true

logging:
  level:
    org.flywaydb: INFO
