name: movie-stream

services:
  postgres-movies:
    image: postgres:15
    container_name: movie-stream-postgres-movies
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: movies
      POSTGRES_USER: movies
      POSTGRES_PASSWORD: movies
    volumes:
      - postgres-movies-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U movies -d movies"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - movie-net

  postgres-keycloak:
    image: postgres:15
    container_name: movie-stream-postgres-keycloak
    restart: unless-stopped
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak
    volumes:
      - postgres-keycloak-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak -d keycloak"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - movie-net

  keycloak:
    image: quay.io/keycloak/keycloak:26.5.2
    container_name: movie-stream-keycloak
    restart: unless-stopped
    command:
      - start-dev
      - --db=postgres
      - --db-url=jdbc:postgresql://postgres-keycloak:5432/keycloak
      - --db-username=keycloak
      - --db-password=keycloak
      - --import-realm
    ports:
      - "8180:8080"
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
      KC_SPI_THEME_CACHE_THEMES: "false"
      KC_SPI_THEME_CACHE_TEMPLATES: "false"
      KC_SPI_THEME_STATIC_MAX_AGE: "-1"
    depends_on:
      postgres-keycloak:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          timeout 5 bash -c 'exec 3<>/dev/tcp/localhost/8080;
          printf "GET /realms/movies/.well-known/openid-configuration HTTP/1.1\r\nHost: localhost\r\nConnection: close\r\n\r\n" >&3;
          grep -q "200 OK" <&3'
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 30s
    volumes:
      - ./config/keycloak:/opt/keycloak/data/import:ro
      - ./config/keycloak-themes/movie-stream:/opt/keycloak/themes/movie-stream:ro
    networks:
      - movie-net

  pgadmin:
    image: dpage/pgadmin4
    container_name: movie-stream-pgadmin
    restart: unless-stopped
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@movies.dev
      PGADMIN_DEFAULT_PASSWORD: admin
    depends_on:
      postgres-movies:
        condition: service_healthy
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    networks:
      - movie-net

  movies-api:
    build:
      context: .
      dockerfile: movies-api/Dockerfile
    image: movies-api:latest
    container_name: movies-api
    restart: unless-stopped
    environment:
      MOVIES_JDBC_URL: jdbc:postgresql://postgres-movies:5432/movies
      MOVIES_JDBC_USERNAME: movies
      MOVIES_JDBC_PASSWORD: movies
      KEYCLOAK_ISSUER_URI: http://keycloak:8080/realms/movies
      EXPECTED_AUDIENCE: movies-api
      JWT_AUTH_RESOURCE_ID: movies-ui
    depends_on:
      postgres-movies:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    networks:
      - movie-net

  movie-gateway:
    build:
      context: .
      dockerfile: movie-gateway/Dockerfile
    image: movie-gateway:latest
    container_name: movie-gateway
    restart: unless-stopped
    ports:
      - "8079:8079"
    environment:
      KEYCLOAK_ISSUER_URI: http://keycloak:8080/realms/movies
      KEYCLOAK_TOKEN_URI: http://keycloak:8080/realms/movies/protocol/openid-connect/token
      EXPECTED_USER_AUDIENCE: movies-ui
      MOVIES_API_URL: http://movies-api:8080
    depends_on:
      keycloak:
        condition: service_healthy
      movies-api:
        condition: service_started
    networks:
      - movie-net

  capabilities-ui:
    build:
      context: .
      dockerfile: capabilities-ui/Dockerfile
    image: capabilities-ui:latest
    container_name: capabilities-ui
    restart: unless-stopped
    ports:
      - "8090:8090"
    env_file:
      - .env.local
    networks:
      - movie-net

  movies-ui:
    build:
      context: ./movies-ui
      dockerfile: Dockerfile
      args:
        OMDB_API_KEY: ${OMDB_API_KEY:-}
    image: movies-ui:latest
    container_name: movies-ui
    restart: unless-stopped
    ports:
      - "7000:80"
    depends_on:
      movie-gateway:
        condition: service_started
    networks:
      - movie-net

volumes:
  postgres-movies-data:
  postgres-keycloak-data:
  pgadmin-data:

networks:
  movie-net:
    driver: bridge
