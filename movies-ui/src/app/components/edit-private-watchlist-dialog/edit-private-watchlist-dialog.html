<div class="dialog-backdrop" (click)="close()">
  <section class="edit-guide-dialog" role="dialog" aria-modal="true" aria-labelledby="edit-watchlist-title" (click)="$event.stopPropagation()">
    <header>
      <h2 id="edit-watchlist-title">Edit Watchlist</h2>
      <button type="button" class="icon-button" title="Close" aria-label="Close" (click)="close()" [disabled]="saving"><span class="material-icons">close</span></button>
    </header>

    @if (errorMessage) { <app-error-alert-dialog [message]="errorMessage" (closed)="errorMessage=''" /> }

    <form (ngSubmit)="save()">
      <label>Title
        <input type="text" [(ngModel)]="title" name="title" maxlength="200" required />
      </label>
      <label>Description
        <textarea [(ngModel)]="description" name="description" maxlength="2000" rows="8"></textarea>
      </label>
      <label class="icon-field">Icon
        <input type="text" [(ngModel)]="icon" name="icon" maxlength="8" />
      </label>

      <footer>
        <button type="button" class="secondary" (click)="close()" [disabled]="saving">Cancel</button>
        <button type="submit" [disabled]="saving || !title.trim()">{{ saving ? 'Saving' : 'Save' }}</button>
      </footer>
    </form>
  </section>
</div>
