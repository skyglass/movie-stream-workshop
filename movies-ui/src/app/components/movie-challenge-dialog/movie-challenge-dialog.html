@if (open) {
  <div class="challenge-backdrop" (click)="close()">
    <section class="challenge-dialog" role="dialog" aria-modal="true" aria-labelledby="movie-challenge-title" (click)="$event.stopPropagation()">
      <header class="challenge-header">
        <h2 id="movie-challenge-title">Choose your movie</h2>
        <button type="button" class="icon-button" title="Close" aria-label="Close" (click)="close()">
          <span class="material-icons" aria-hidden="true">close</span>
        </button>
      </header>

      @if (loading) {
        <div class="challenge-state">Loading movie challenge</div>
      } @else if (errorMessage) {
        <div class="challenge-state error">{{ errorMessage }}</div>
      } @else if (!challenge) {
        <div class="challenge-state">Recommend more movies to participate</div>
      } @else {
        <div class="challenge-stage" [class.has-selection]="selectedMovieId">
          <button
            type="button"
            class="challenge-movie left"
            [class.winner]="isWinner(challenge.movie1)"
            [class.loser]="isLoser(challenge.movie1)"
            [disabled]="!!selectedMovieId"
            (click)="selectMovie(challenge.movie1)">
            <span class="poster-shell">
              <img [src]="poster(challenge.movie1)" [alt]="challenge.movie1.title + ' poster'" />
              <span class="check-circle" aria-hidden="true">
                <span class="material-icons">check</span>
              </span>
            </span>
            <span class="challenge-title">{{ challenge.movie1.title }}</span>
          </button>

          <button
            type="button"
            class="challenge-movie right"
            [class.winner]="isWinner(challenge.movie2)"
            [class.loser]="isLoser(challenge.movie2)"
            [disabled]="!!selectedMovieId"
            (click)="selectMovie(challenge.movie2)">
            <span class="poster-shell">
              <img [src]="poster(challenge.movie2)" [alt]="challenge.movie2.title + ' poster'" />
              <span class="check-circle" aria-hidden="true">
                <span class="material-icons">check</span>
              </span>
            </span>
            <span class="challenge-title">{{ challenge.movie2.title }}</span>
          </button>
        </div>

        <footer class="challenge-actions" [class.visible]="showNext">
          <button type="button" class="next-button" [disabled]="!showNext" (click)="loadNextChallenge()">Next</button>
        </footer>
      }
    </section>
  </div>
}
