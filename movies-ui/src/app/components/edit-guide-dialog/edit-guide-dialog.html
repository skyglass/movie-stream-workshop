<div class="dialog-backdrop" (click)="close()">
  <section class="edit-guide-dialog" role="dialog" aria-modal="true" aria-labelledby="edit-guide-title" (click)="$event.stopPropagation()">
    <header>
      <h2 id="edit-guide-title">Edit {{ entryLabel }}</h2>
      <button type="button" class="icon-button" title="Close" aria-label="Close" (click)="close()" [disabled]="saving"><span class="material-icons">close</span></button>
    </header>

    @if (errorMessage) { <p class="error">{{ errorMessage }}</p> }

    <form (ngSubmit)="save()">
      <label>Name
        <input type="text" [(ngModel)]="name" name="name" maxlength="200" required />
      </label>
      <label>Description
        <textarea [(ngModel)]="description" name="description" maxlength="2000" rows="8"></textarea>
      </label>
      <label class="icon-field">Icon
        <input type="text" [(ngModel)]="icon" name="icon" maxlength="8" />
      </label>

      <footer>
        <button type="button" class="secondary" (click)="close()" [disabled]="saving">Cancel</button>
        <button type="submit" [disabled]="saving || !name.trim()">{{ saving ? 'Saving' : 'Save' }}</button>
      </footer>
    </form>
  </section>
</div>
