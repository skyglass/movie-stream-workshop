@if (authenticated$ | async) {
  <div class="auth-status">
    @if (user$ | async; as user) {
      <span>Hi {{ displayUsername(user) }}</span>
    } @else {
      <span>Signed in</span>
    }
    <a
      mat-icon-button
      routerLink="/profile"
      routerLinkActive="active-profile"
      title="Profile"
      aria-label="Profile">
      <span class="material-icons" aria-hidden="true">person</span>
    </a>
    <button mat-stroked-button type="button" (click)="logout()">Logout</button>
  </div>
} @else {
  <form [formGroup]="loginForm" (ngSubmit)="login()" class="auth-form">
    <mat-form-field appearance="outline">
      <mat-label>Username</mat-label>
      <input matInput formControlName="username" autocomplete="username" />
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Password</mat-label>
      <input matInput type="password" formControlName="password" autocomplete="current-password" />
    </mat-form-field>

    <button mat-flat-button color="primary" type="submit" [disabled]="loginForm.invalid || submitting">
      {{ submitting ? 'Signing in' : 'Sign in' }}
    </button>

    <button class="register-link" type="button" (click)="register()">Register</button>

    @if (errorMessage) {
      <span class="auth-error">{{ errorMessage }}</span>
    }
  </form>
}
