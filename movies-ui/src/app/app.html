<header class="app-header">
  <div class="brand">
    <a class="brand-name" routerLink="/home" aria-label="Movie Challenge home">Movie Challenge</a>
    <nav>
      <a routerLink="/home" routerLinkActive="active">Home</a>
      <a routerLink="/search" routerLinkActive="active">Search Wizard</a>
      @if (auth.token) {
        <a routerLink="/movie-challenge" routerLinkActive="active">Movie Challenge</a>
        <a routerLink="/favorites" routerLinkActive="active">My Favorite Movies</a>
        <a routerLink="/movie-courses" routerLinkActive="active">Movie Courses</a>
        <a routerLink="/users-recommended" routerLinkActive="active">Recommended Movies</a>
      }
      @if (auth.isAdmin) {
        <a routerLink="/wizard" routerLinkActive="active">Movie Wizard</a>
        <a routerLink="/admin" routerLinkActive="active">Admin</a>
      }
    </nav>
  </div>
  <app-auth-panel></app-auth-panel>
</header>
<main>
  <router-outlet></router-outlet>
</main>
