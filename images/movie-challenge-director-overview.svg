<svg xmlns="http://www.w3.org/2000/svg" width="1672" height="941" viewBox="0 0 1672 941" role="img" aria-labelledby="title desc">
  <title id="title">Movie Challenge Director overview</title>
  <desc id="desc">Generated cinematic Movie Challenge Director artwork with exact footer from the Movie Challenge Referee image.</desc>
  <defs>
    <clipPath id="footerClip"><rect x="0" y="800" width="1672" height="141"/></clipPath>
    <filter id="labelShadow" x="-20%" y="-30%" width="140%" height="160%">
      <feDropShadow dx="0" dy="5" stdDeviation="5" flood-color="#2b496c" flood-opacity="0.22"/>
    </filter>
    <linearGradient id="titleGlass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#eef8ff" stop-opacity="0.88"/>
    </linearGradient>
    <linearGradient id="teal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#20c8bf"/>
      <stop offset="1" stop-color="#07857d"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2d80df"/>
      <stop offset="1" stop-color="#154da5"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7cc5a"/>
      <stop offset="1" stop-color="#b87805"/>
    </linearGradient>
    <linearGradient id="red" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ff8172"/>
      <stop offset="1" stop-color="#eb4238"/>
    </linearGradient>
    <style>
      .titleMain { font: 900 54px Arial, Helvetica, sans-serif; fill: #030b37; letter-spacing: 0; }
      .titleAccent { font: 900 54px Arial, Helvetica, sans-serif; fill: #b87805; letter-spacing: 0; }
      .subtitle { font: 400 24px Arial, Helvetica, sans-serif; fill: #1f2b4d; letter-spacing: 0; }
      .labelTitle { font: 900 25px Arial, Helvetica, sans-serif; letter-spacing: 0; }
      .labelText { font: 400 18px Arial, Helvetica, sans-serif; fill: #151f38; letter-spacing: 0; }
    </style>
  </defs>

  <image href="movie-challenge-director-generated-base.png" x="0" y="0" width="1672" height="941" preserveAspectRatio="xMidYMid slice"/>

  <g filter="url(#labelShadow)">
    <rect x="476" y="18" width="720" height="112" rx="34" fill="url(#titleGlass)" stroke="#d7e7f7" stroke-width="2"/>
    <text x="936" y="72" text-anchor="end" class="titleMain">Movie Challenge</text>
    <text x="948" y="72" text-anchor="start" class="titleAccent">Director</text>
    <text x="836" y="107" text-anchor="middle" class="subtitle">Plotline of Your Favorite Movies</text>
  </g>

  <g filter="url(#labelShadow)">
    <rect x="126" y="104" width="226" height="74" rx="16" fill="#ffffff" fill-opacity="0.9" stroke="#20b7ae" stroke-width="2"/>
    <circle cx="162" cy="141" r="22" fill="url(#teal)"/>
    <rect x="151" y="132" width="12" height="28" rx="3" fill="#fff"/>
    <rect x="166" y="124" width="12" height="36" rx="3" fill="#d9fffb"/>
    <text x="195" y="132" class="labelTitle" fill="#07857d">Cast</text>
    <text x="195" y="160" class="labelText">Select candidates</text>
  </g>

  <g filter="url(#labelShadow)">
    <rect x="132" y="404" width="270" height="82" rx="16" fill="#ffffff" fill-opacity="0.9" stroke="#83b3e8" stroke-width="2"/>
    <circle cx="170" cy="445" r="23" fill="url(#blue)"/>
    <path d="M170 422 l7 18 h19 l-15 11 l6 19 l-17 -11 l-17 11 l6 -19 l-15 -11 h19z" fill="#fff"/>
    <text x="205" y="435" class="labelTitle" fill="#1b56b8">Next Lead</text>
    <text x="205" y="463" class="labelText">Choose your winner</text>
  </g>

  <g filter="url(#labelShadow)">
    <rect x="1234" y="96" width="340" height="112" rx="16" fill="#ffffff" fill-opacity="0.9" stroke="#d6b45a" stroke-width="2"/>
    <circle cx="1276" cy="152" r="24" fill="url(#gold)"/>
    <rect x="1261" y="139" width="30" height="25" rx="5" fill="none" stroke="#fff" stroke-width="5"/>
    <circle cx="1293" cy="138" r="5" fill="#fff"/>
    <text x="1318" y="125" class="labelTitle" fill="#b87805">Best Scene</text>
    <text x="1318" y="152" class="labelText">Promote winner down-rank</text>
    <text x="1318" y="175" class="labelText">with history + progress</text>
    <text x="1318" y="196" class="labelText">to meaningful matchup</text>
  </g>

  <g filter="url(#labelShadow)">
    <rect x="1252" y="386" width="324" height="82" rx="16" fill="#ffffff" fill-opacity="0.9" stroke="#7bc8c8" stroke-width="2"/>
    <circle cx="1292" cy="427" r="23" fill="#f5fbff" stroke="#7bc8c8" stroke-width="2"/>
    <path d="M1278 417 h28 M1278 437 h28" stroke="#07857d" stroke-width="6" stroke-linecap="round"/>
    <path d="M1279 426 l10 10 l18 -22" fill="none" stroke="#3c9d2e" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="1336" y="417" class="labelTitle" fill="#07857d">Fresh Pair</text>
    <text x="1336" y="445" class="labelText">Promote new candidates</text>
  </g>

  <g filter="url(#labelShadow)">
    <rect x="1242" y="620" width="330" height="84" rx="16" fill="#ffffff" fill-opacity="0.92" stroke="#83b3e8" stroke-width="2"/>
    <circle cx="1283" cy="662" r="24" fill="#f4f9ff" stroke="#83b3e8" stroke-width="2"/>
    <ellipse cx="1283" cy="651" rx="21" ry="8" fill="url(#blue)"/>
    <path d="M1262 651 v24 c0 6 10 9 21 9s21-3 21-9v-24" fill="url(#blue)"/>
    <path d="M1262 663 c0 6 10 9 21 9s21-3 21-9" fill="none" stroke="#b4d9ff" stroke-width="2"/>
    <text x="1322" y="652" class="labelTitle" fill="#1b56b8">One SQL Take</text>
    <text x="1322" y="680" class="labelText">One query - one challenge</text>
  </g>

  <image href="movie-challenge-referee-overview.png" x="0" y="0" width="1672" height="941" clip-path="url(#footerClip)"/>
</svg>
