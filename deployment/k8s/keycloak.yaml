apiVersion: v1
kind: PersistentVolume
metadata:
  name: keycloak-postgres-ebs-pv
  labels:
    app.kubernetes.io/name: keycloak-postgres
    app.kubernetes.io/part-of: movie-stream
spec:
  capacity:
    storage: ${KEYCLOAK_POSTGRES_STORAGE_SIZE}
  volumeMode: Filesystem
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: manual
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: topology.kubernetes.io/zone
              operator: In
              values:
                - ${KEYCLOAK_POSTGRES_VOLUME_AZ}
  csi:
    driver: ebs.csi.aws.com
    volumeHandle: ${KEYCLOAK_POSTGRES_VOLUME_ID}
    fsType: ext4
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: keycloak-postgres-data
  namespace: ${APP_NAMESPACE}
  labels:
    app.kubernetes.io/name: keycloak-postgres
    app.kubernetes.io/part-of: movie-stream
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: manual
  volumeName: keycloak-postgres-ebs-pv
  resources:
    requests:
      storage: ${KEYCLOAK_POSTGRES_STORAGE_SIZE}
---
apiVersion: v1
kind: Service
metadata:
  name: keycloak-postgres
  namespace: ${APP_NAMESPACE}
  labels:
    app.kubernetes.io/name: keycloak-postgres
    app.kubernetes.io/part-of: movie-stream
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: keycloak-postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: keycloak-postgres
  namespace: ${APP_NAMESPACE}
  labels:
    app.kubernetes.io/name: keycloak-postgres
    app.kubernetes.io/part-of: movie-stream
spec:
  serviceName: keycloak-postgres
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: keycloak-postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: keycloak-postgres
        app.kubernetes.io/part-of: movie-stream
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: topology.kubernetes.io/zone
                    operator: In
                    values:
                      - ${KEYCLOAK_POSTGRES_VOLUME_AZ}
      securityContext:
        fsGroup: 999
        fsGroupChangePolicy: OnRootMismatch
      containers:
        - name: postgres
          image: postgres:15
          imagePullPolicy: IfNotPresent
          ports:
            - name: postgres
              containerPort: 5432
          env:
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: movie-stream-secrets
                  key: KEYCLOAK_POSTGRES_DB
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: movie-stream-secrets
                  key: KEYCLOAK_POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: movie-stream-secrets
                  key: KEYCLOAK_POSTGRES_PASSWORD
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: keycloak-postgres-data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              memory: 1Gi
      volumes:
        - name: keycloak-postgres-data
          persistentVolumeClaim:
            claimName: keycloak-postgres-data
---
apiVersion: v1
kind: Service
metadata:
  name: keycloak
  namespace: ${APP_NAMESPACE}
  labels:
    app.kubernetes.io/name: keycloak
    app.kubernetes.io/part-of: movie-stream
  annotations:
    alb.ingress.kubernetes.io/healthcheck-path: /realms/master
    alb.ingress.kubernetes.io/success-codes: "200-399"
spec:
  selector:
    app.kubernetes.io/name: keycloak
  ports:
    - name: http
      port: 8080
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak
  namespace: ${APP_NAMESPACE}
  labels:
    app.kubernetes.io/name: keycloak
    app.kubernetes.io/part-of: movie-stream
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: keycloak
  template:
    metadata:
      labels:
        app.kubernetes.io/name: keycloak
        app.kubernetes.io/part-of: movie-stream
    spec:
      containers:
        - name: keycloak
          image: quay.io/keycloak/keycloak:26.5.2
          imagePullPolicy: IfNotPresent
          args:
            - start
            - --import-realm
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: KEYCLOAK_ADMIN
              valueFrom:
                secretKeyRef:
                  name: movie-stream-secrets
                  key: KEYCLOAK_ADMIN
            - name: KEYCLOAK_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: movie-stream-secrets
                  key: KEYCLOAK_ADMIN_PASSWORD
            - name: KC_DB
              value: postgres
            - name: KC_DB_URL_HOST
              value: keycloak-postgres
            - name: KC_DB_URL_PORT
              value: "5432"
            - name: KC_DB_URL_DATABASE
              valueFrom:
                secretKeyRef:
                  name: movie-stream-secrets
                  key: KEYCLOAK_POSTGRES_DB
            - name: KC_DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: movie-stream-secrets
                  key: KEYCLOAK_POSTGRES_USER
            - name: KC_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: movie-stream-secrets
                  key: KEYCLOAK_POSTGRES_PASSWORD
            - name: KC_HTTP_ENABLED
              value: "true"
            - name: KC_HOSTNAME_STRICT
              value: "false"
            - name: KC_PROXY_HEADERS
              value: xforwarded
          volumeMounts:
            - name: keycloak-realm
              mountPath: /opt/keycloak/data/import/realm-movies.json
              subPath: realm-movies.json
              readOnly: true
          startupProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /realms/master
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 12
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              memory: 2Gi
      volumes:
        - name: keycloak-realm
          configMap:
            name: keycloak-realm
