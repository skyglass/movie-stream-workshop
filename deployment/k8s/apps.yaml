apiVersion: v1
kind: Service
metadata:
  name: movies-api
  namespace: ${APP_NAMESPACE}
  labels:
    app.kubernetes.io/name: movies-api
    app.kubernetes.io/part-of: movie-stream
spec:
  selector:
    app.kubernetes.io/name: movies-api
  ports:
    - name: http
      port: 8080
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: movies-api
  namespace: ${APP_NAMESPACE}
  labels:
    app.kubernetes.io/name: movies-api
    app.kubernetes.io/part-of: movie-stream
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: movies-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: movies-api
        app.kubernetes.io/part-of: movie-stream
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: movies-api
          image: ${CONTAINER_REGISTRY}/movies-api:${IMAGE_VERSION}
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: MOVIES_JDBC_URL
              valueFrom:
                configMapKeyRef:
                  name: movie-stream-config
                  key: MOVIES_JDBC_URL
            - name: MOVIES_JDBC_USERNAME
              valueFrom:
                secretKeyRef:
                  name: movie-stream-secrets
                  key: MOVIES_JDBC_USERNAME
            - name: MOVIES_JDBC_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: movie-stream-secrets
                  key: MOVIES_JDBC_PASSWORD
            - name: KEYCLOAK_ISSUER_URI
              valueFrom:
                configMapKeyRef:
                  name: movie-stream-config
                  key: KEYCLOAK_ISSUER_URI
            - name: EXPECTED_AUDIENCE
              value: movies-api
            - name: JWT_AUTH_RESOURCE_ID
              value: movies-ui
            - name: APP_CORS_ALLOWED_ORIGINS
              valueFrom:
                configMapKeyRef:
                  name: movie-stream-config
                  key: APP_CORS_ALLOWED_ORIGINS
            - name: JAVA_OPTS
              valueFrom:
                configMapKeyRef:
                  name: movie-stream-config
                  key: JAVA_OPTS
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 300m
              memory: 768Mi
            limits:
              memory: 1536Mi
---
apiVersion: v1
kind: Service
metadata:
  name: movie-gateway
  namespace: ${APP_NAMESPACE}
  labels:
    app.kubernetes.io/name: movie-gateway
    app.kubernetes.io/part-of: movie-stream
  annotations:
    alb.ingress.kubernetes.io/healthcheck-path: /actuator/health/readiness
    alb.ingress.kubernetes.io/success-codes: "200"
spec:
  selector:
    app.kubernetes.io/name: movie-gateway
  ports:
    - name: http
      port: 8079
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: movie-gateway
  namespace: ${APP_NAMESPACE}
  labels:
    app.kubernetes.io/name: movie-gateway
    app.kubernetes.io/part-of: movie-stream
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: movie-gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: movie-gateway
        app.kubernetes.io/part-of: movie-stream
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: movie-gateway
          image: ${CONTAINER_REGISTRY}/movie-gateway:${IMAGE_VERSION}
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8079
          env:
            - name: KEYCLOAK_ISSUER_URI
              valueFrom:
                configMapKeyRef:
                  name: movie-stream-config
                  key: KEYCLOAK_ISSUER_URI
            - name: KEYCLOAK_TOKEN_URI
              valueFrom:
                configMapKeyRef:
                  name: movie-stream-config
                  key: KEYCLOAK_TOKEN_URI
            - name: EXPECTED_USER_AUDIENCE
              value: movies-ui
            - name: MOVIES_API_URL
              value: http://movies-api:8080
            - name: JAVA_OPTS
              valueFrom:
                configMapKeyRef:
                  name: movie-stream-config
                  key: JAVA_OPTS
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 300m
              memory: 768Mi
            limits:
              memory: 1536Mi
---
apiVersion: v1
kind: Service
metadata:
  name: movies-ui
  namespace: ${APP_NAMESPACE}
  labels:
    app.kubernetes.io/name: movies-ui
    app.kubernetes.io/part-of: movie-stream
  annotations:
    alb.ingress.kubernetes.io/healthcheck-path: /
    alb.ingress.kubernetes.io/success-codes: "200-399"
spec:
  selector:
    app.kubernetes.io/name: movies-ui
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: movies-ui
  namespace: ${APP_NAMESPACE}
  labels:
    app.kubernetes.io/name: movies-ui
    app.kubernetes.io/part-of: movie-stream
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: movies-ui
  template:
    metadata:
      labels:
        app.kubernetes.io/name: movies-ui
        app.kubernetes.io/part-of: movie-stream
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: movies-ui
          image: ${CONTAINER_REGISTRY}/movies-ui:${IMAGE_VERSION}
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
          volumeMounts:
            - name: movies-ui-config
              mountPath: /usr/share/nginx/html/app-config.json
              subPath: app-config.json
              readOnly: true
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 256Mi
      volumes:
        - name: movies-ui-config
          configMap:
            name: movies-ui-config
