apiVersion: v1
kind: PersistentVolume
metadata:
  name: movies-postgres-ebs-pv
  labels:
    app.kubernetes.io/name: movies-postgres
    app.kubernetes.io/part-of: movie-stream
spec:
  capacity:
    storage: ${MOVIES_POSTGRES_STORAGE_SIZE}
  volumeMode: Filesystem
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: manual
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: topology.kubernetes.io/zone
              operator: In
              values:
                - ${MOVIES_POSTGRES_VOLUME_AZ}
  csi:
    driver: ebs.csi.aws.com
    volumeHandle: ${MOVIES_POSTGRES_VOLUME_ID}
    fsType: ext4
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: movies-postgres-data
  namespace: ${APP_NAMESPACE}
  labels:
    app.kubernetes.io/name: movies-postgres
    app.kubernetes.io/part-of: movie-stream
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: manual
  volumeName: movies-postgres-ebs-pv
  resources:
    requests:
      storage: ${MOVIES_POSTGRES_STORAGE_SIZE}
---
apiVersion: v1
kind: Service
metadata:
  name: movies-postgres
  namespace: ${APP_NAMESPACE}
  labels:
    app.kubernetes.io/name: movies-postgres
    app.kubernetes.io/part-of: movie-stream
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: movies-postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: movies-postgres
  namespace: ${APP_NAMESPACE}
  labels:
    app.kubernetes.io/name: movies-postgres
    app.kubernetes.io/part-of: movie-stream
spec:
  serviceName: movies-postgres
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: movies-postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: movies-postgres
        app.kubernetes.io/part-of: movie-stream
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: topology.kubernetes.io/zone
                    operator: In
                    values:
                      - ${MOVIES_POSTGRES_VOLUME_AZ}
      securityContext:
        fsGroup: 999
        fsGroupChangePolicy: OnRootMismatch
      containers:
        - name: postgres
          image: postgres:15
          imagePullPolicy: IfNotPresent
          ports:
            - name: postgres
              containerPort: 5432
          env:
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: movie-stream-secrets
                  key: MOVIES_POSTGRES_DB
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: movie-stream-secrets
                  key: MOVIES_JDBC_USERNAME
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: movie-stream-secrets
                  key: MOVIES_JDBC_PASSWORD
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: movies-postgres-data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              memory: 1Gi
      volumes:
        - name: movies-postgres-data
          persistentVolumeClaim:
            claimName: movies-postgres-data
