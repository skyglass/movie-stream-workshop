apiVersion: v1
kind: Service
metadata:
  name: pgadmin
  namespace: ${APP_NAMESPACE}
  labels:
    app.kubernetes.io/name: pgadmin
    app.kubernetes.io/part-of: movie-stream
  annotations:
    alb.ingress.kubernetes.io/healthcheck-path: /pgadmin/misc/ping
    alb.ingress.kubernetes.io/success-codes: "200-399"
spec:
  selector:
    app.kubernetes.io/name: pgadmin
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pgadmin
  namespace: ${APP_NAMESPACE}
  labels:
    app.kubernetes.io/name: pgadmin
    app.kubernetes.io/part-of: movie-stream
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: pgadmin
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pgadmin
        app.kubernetes.io/part-of: movie-stream
    spec:
      containers:
        - name: pgadmin
          image: dpage/pgadmin4:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
          env:
            - name: PGADMIN_DEFAULT_EMAIL
              valueFrom:
                secretKeyRef:
                  name: movie-stream-secrets
                  key: PGADMIN_DEFAULT_EMAIL
            - name: PGADMIN_DEFAULT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: movie-stream-secrets
                  key: PGADMIN_DEFAULT_PASSWORD
            - name: SCRIPT_NAME
              value: /pgadmin
            - name: PGADMIN_CONFIG_PROXY_X_HOST_COUNT
              value: "1"
            - name: PGADMIN_CONFIG_PROXY_X_PREFIX_COUNT
              value: "1"
          readinessProbe:
            httpGet:
              path: /pgadmin/misc/ping
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /pgadmin/misc/ping
              port: http
            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 512Mi
